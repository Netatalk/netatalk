version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/.clusterfuzzlite"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "docker"
    directory: "/distrib/docker"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
