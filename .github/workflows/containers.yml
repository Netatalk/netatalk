name: Containers

on:
  push:
    branches:
      - main
      - branch-*
  pull_request:
    branches:
      - main
      - branch-*
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}
  CONT_PASSWD: ${{ secrets.AFP_PASSWD }}
  DB_PASSWD: ${{ secrets.MARIADB_ROOT_PASSWORD }}

jobs:
  build-container:
    name: Build production container
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !github.event.pull_request.head.repo.fork }}
    permissions:
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Create image name
        run: |
          echo "IMAGE_NAME=${REPO,,}" >> ${GITHUB_ENV}
      - name: Login to container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=${{ github.sha }}
      - name: Build and push container image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: distrib/docker/netatalk.Dockerfile
          push: true
          labels: ${{ steps.metadata.outputs.labels }}
          tags: ${{ steps.metadata.outputs.tags }}

  build-container-testsuite:
    name: Build Alpine testsuite container
