            gcc-c++ \
            glib2-devel \
            iniparser-devel \
            krb5-devel \
            libacl-devel \
            libdb-devel \
            libev-devel \
            file-devel \
            libgcrypt-devel \
            libtalloc-devel \
            localsearch \
            mariadb-connector-c-devel \
            meson \
            ninja-build \
            openldap-devel \
            pam-devel \
            pandoc \
            perl \
            quota-devel \
            sqlite-devel \
            systemd \
            systemtap-sdt-devel \
            tinysparql-devel \
            valgrind \
            xapian-core-devel
      - name: Configure
        run: |
          meson setup build \
