name: Builds

on:
  push:
    branches:
      - main
      - branch-*
  pull_request:
    branches:
      - main
      - branch-*
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  build-alpine:
    name: Alpine Linux
    runs-on: ubuntu-latest
    timeout-minutes: 24
    container:
      image: alpine:3.23.2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: |
          apk add \
            acl-dev \
            avahi-compat-libdns_sd \
            avahi-dev \
            bison \
            build-base \
            ca-certificates \
            cracklib \
            cracklib-dev \
            cracklib-words \
            cups \
            cups-dev \
            curl \
            db-dev \
            dbus-dev \
            dconf \
            flex \
            file-dev \
            gcc \
            glib \
            iniparser-dev \
            krb5-dev \
            libev-dev \
            libgcrypt-dev \
            libtirpc-dev \
            libtracker \
            linux-pam-dev \
            localsearch \
            mariadb-dev \
            meson \
            ninja \
            openldap-dev \
            openrc \
            pandoc \
            perl \
            pkgconfig \
            rpcsvc-proto-dev \
            sqlite-dev \
            talloc-dev \
            tinysparql-dev \
            valgrind \
            xapian-core-dev
      - name: Configure
        run: |
          meson setup build \
            -Dbuildtype=debugoptimized \
            -Dwith-appletalk=true \
            -Dwith-cups-pap-backend=true \
            -Dwith-eventloop=libev \
            -Dwith-statedir-path=/var/lib \
            -Dwith-tests=true \
            -Dwith-testsuite=true
      - name: Build
        run: meson compile -C build
      - name: Run integration tests
        run: meson test -C build
      - name: Run memory profiling
        run: meson test --wrapper='valgrind --leak-check=full --error-exitcode=1' -C build
      - name: Install
        run: meson install -C build
      - name: Check netatalk capabilities
        run: |
          netatalk -V
          afpd -V
          atalkd -V
          a2boot -V
          macipgw -V
          papd -V
          timelord -V
      - name: Upload meson logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meson-logs-${{ github.job }}
          path: build/meson-logs

  build-archlinux:
    name: Arch Linux
    runs-on: ubuntu-latest
    timeout-minutes: 24
    container:
      image: archlinux:base-devel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm \
            avahi \
            bison \
            cmark-gfm \
            cracklib \
            cups \
            db \
            dconf \
            flex \
            file \
            gcc \
            iniparser \
            libev \
            localsearch \
            mariadb-clients \
            meson \
            ninja \
            perl \
            pkgconfig \
            rpcsvc-proto \
            sqlite \
            talloc \
            tinysparql \
            xapian-core
      - name: Configure
        run: |
          meson setup build \
            -Dbuildtype=debugoptimized \
            -Dwith-appletalk=true \
            -Dwith-cups-pap-backend=true \
            -Dwith-eventloop=libev \
            -Dwith-init-hooks=false \
            -Dwith-tests=true \
            -Dwith-testsuite=true
      - name: Build
        run: meson compile -C build
      - name: Run integration tests
        run: meson test -C build
      - name: Install
        run: meson install -C build
      - name: Check netatalk capabilities
        run: |
          netatalk -V
          afpd -V
          atalkd -V
          a2boot -V
          macipgw -V
          papd -V
          timelord -V
      - name: Upload meson logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meson-logs-${{ github.job }}
          path: build/meson-logs

  build-debian:
    name: Debian Linux
    runs-on: ubuntu-latest
    timeout-minutes: 24
    container:
      image: debian:13.3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install --assume-yes --no-install-recommends \
            bison \
            ca-certificates \
            cmark-gfm \
            cracklib-runtime \
            dconf-cli \
            file \
            flex \
            g++ \
            gcc \
            libacl1-dev \
            libavahi-client-dev \
            libcrack2-dev \
            libcrypt-dev \
            libcups2-dev \
            libdb-dev \
            libdbus-1-dev \
            libev-dev \
            libgcrypt20-dev \
            libglib2.0-dev \
            libiniparser-dev \
            libkrb5-dev \
            libldap2-dev \
            libmagic-dev \
            libmariadb-dev \
            libpam0g-dev \
            libsqlite3-dev \
            libtalloc-dev \
            libtirpc-dev \
            libtracker-sparql-3.0-dev \
            libwrap0-dev \
            libxapian-dev \
            meson \
            ninja-build \
            quota \
            systemtap-sdt-dev \
            tcpd \
            tracker \
            tracker-miner-fs \
            valgrind
      - name: Configure
        run: |
          meson setup build \
            -Dbuildtype=debugoptimized \
            -Dwith-appletalk=true \
            -Dwith-cups-pap-backend=true \
            -Dwith-eventloop=libev \
            -Dwith-init-hooks=false \
            -Dwith-init-style=debian-sysv,systemd \
            -Dwith-pkgconfdir-path=/etc/netatalk \
            -Dwith-tests=true \
            -Dwith-testsuite=true
      - name: Build
        run: meson compile -C build
      - name: Run integration tests
        run: meson test -C build
      - name: Run memory profiling
        run: meson test --wrapper='valgrind --leak-check=full --error-exitcode=1' -C build
      - name: Install
        run: meson install -C build
      - name: Check netatalk capabilities
        run: |
          netatalk -V
          afpd -V
          atalkd -V
          a2boot -V
          macipgw -V
          papd -V
          timelord -V
      - name: Upload meson logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meson-logs-${{ github.job }}
