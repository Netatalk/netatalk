name: Builds

# Pure build + unit test jobs on Linux distributions.
# The non-Linux VM legs that also run the AFP spectest live in
# spectest-vms.yml; container spectests in containers.yml; the macOS leg
# in spectest-macos.yml.

on:
  push:
    branches:
      - main
      - branch-*
  pull_request:
    branches:
      - main
      - branch-*
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

env:
  STUFFIT_RS_COMMIT: 16336d7abff5c925e8081869bfa0dd6ee27f0658
  LD_LIBRARY_PATH: /usr/local/lib
  PKG_CONFIG_PATH: /usr/local/lib/pkgconfig

jobs:
  build-alpine:
    name: Alpine Linux
    runs-on: ubuntu-latest
    timeout-minutes: 24
    container:
      image: alpine:3.23.2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        run: |
          apk add \
            acl-dev \
            avahi-compat-libdns_sd \
            avahi-dev \
            bison \
            build-base \
            ca-certificates \
            cargo \
            cracklib \
            cracklib-dev \
            cracklib-words \
            cups \
            cups-dev \
            curl \
            db-dev \
            dbus-dev \
            dconf \
            flex \
            file-dev \
            git \
            gcc \
            glib \
            iniparser-dev \
            krb5-dev \
            libev-dev \
            libgcrypt-dev \
            libtirpc-dev \
            libtracker \
            linux-pam-dev \
            localsearch \
            mariadb-dev \
            meson \
            ninja \
            openldap-dev \
            openrc \
            pandoc \
            perl \
            pkgconfig \
            rpcsvc-proto-dev \
            rust \
            sqlite-dev \
            talloc-dev \
            tinysparql-dev \
            valgrind \
            xapian-core-dev
      - name: Install stuffit-ffi
        run: |
          git clone https://github.com/benletchford/stuffit-rs.git /tmp/stuffit-rs
          cd /tmp/stuffit-rs
          git checkout "$STUFFIT_RS_COMMIT"
          cargo build --release --locked -p stuffit-ffi
          make -C stuffit-ffi install-files PREFIX=/usr/local
      - name: Configure
        run: |
          meson setup build \
            -Dbuildtype=debugoptimized \
            -Dwith-appletalk=true \
            -Dwith-cups-pap-backend=true \
            -Dwith-eventloop=libev \
            -Dwith-statedir-path=/var/lib \
            -Dwith-stuffit=true \
            -Dwith-tests=true \
            -Dwith-testsuite=true
      - name: Build
        run: meson compile -C build
      - name: Test
        run: meson test -C build
      - name: Run memory profiling
        run: meson test --wrapper='valgrind --leak-check=full --error-exitcode=1' -C build
      - name: Install
        run: meson install -C build
      - name: Check netatalk capabilities
        run: |
          netatalk -V
          afpd -V
          atalkd -V
          a2boot -V
          macipgw -V
          papd -V
          timelord -V
      - name: Upload meson logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meson-logs-${{ github.job }}
          path: build/meson-logs

  build-archlinux:
    name: Arch Linux
    runs-on: ubuntu-latest
    timeout-minutes: 24
    container:
      image: archlinux:base-devel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm \
            avahi \
            bison \
            cmark-gfm \
            cracklib \
            cups \
            db \
            dconf \
            flex \
            file \
            gcc \
            git \
            iniparser \
            libev \
            localsearch \
            mariadb-clients \
            meson \
            ninja \
            perl \
            pkgconfig \
            rpcsvc-proto \
            rust \
            sqlite \
            talloc \
            tinysparql \
            xapian-core
      - name: Install stuffit-ffi
        run: |
          git clone https://github.com/benletchford/stuffit-rs.git /tmp/stuffit-rs
          cd /tmp/stuffit-rs
          git checkout "$STUFFIT_RS_COMMIT"
          cargo build --release --locked -p stuffit-ffi
          make -C stuffit-ffi install-files PREFIX=/usr/local
      - name: Configure
        run: |
          meson setup build \
            -Dbuildtype=debugoptimized \
            -Dwith-appletalk=true \
            -Dwith-cups-pap-backend=true \
            -Dwith-eventloop=libev \
            -Dwith-init-hooks=false \
            -Dwith-stuffit=true \
            -Dwith-tests=true \
            -Dwith-testsuite=true
      - name: Build
        run: meson compile -C build
      - name: Test
        run: meson test -C build
      - name: Install
        run: meson install -C build
      - name: Check netatalk capabilities
        run: |
          netatalk -V
          afpd -V
          atalkd -V
          a2boot -V
          macipgw -V
          papd -V
          timelord -V
      - name: Upload meson logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meson-logs-${{ github.job }}
          path: build/meson-logs

  build-debian:
    name: Debian Linux
    runs-on: ubuntu-latest
    timeout-minutes: 24
    container:
      image: debian:13.3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install --assume-yes --no-install-recommends \
            bison \
            ca-certificates \
            cmark-gfm \
            cracklib-runtime \
            dconf-cli \
            file \
            flex \
            g++ \
            gcc \
            libacl1-dev \
            libavahi-client-dev \
            libcrack2-dev \
            libcrypt-dev \
            libcups2-dev \
            libdb-dev \
            libdbus-1-dev \
            libev-dev \
            libgcrypt20-dev \
            libglib2.0-dev \
            libiniparser-dev \
            libkrb5-dev \
            libldap2-dev \
            libmagic-dev \
            libmariadb-dev \
            libpam0g-dev \
            libsqlite3-dev \
            libtalloc-dev \
            libtirpc-dev \
            libtracker-sparql-3.0-dev \
            libwrap0-dev \
            libxapian-dev \
            meson \
            ninja-build \
            quota \
            systemtap-sdt-dev \
            tcpd \
            tracker \
            tracker-miner-fs \
            valgrind
      - name: Configure
        run: |
          meson setup build \
            -Dbuildtype=debugoptimized \
            -Dwith-appletalk=true \
            -Dwith-cups-pap-backend=true \
            -Dwith-eventloop=libev \
            -Dwith-init-hooks=false \
            -Dwith-init-style=debian-sysv,systemd \
            -Dwith-pkgconfdir-path=/etc/netatalk \
            -Dwith-tests=true \
            -Dwith-testsuite=true
      - name: Build
        run: meson compile -C build
      - name: Test
        run: meson test -C build
      - name: Run memory profiling
        run: meson test --wrapper='valgrind --leak-check=full --error-exitcode=1' -C build
      - name: Install
        run: meson install -C build
      - name: Check netatalk capabilities
        run: |
          netatalk -V
          afpd -V
          atalkd -V
          a2boot -V
          macipgw -V
          papd -V
          timelord -V
      - name: Upload meson logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meson-logs-${{ github.job }}
          path: build/meson-logs

  build-fedora:
    name: Fedora Linux
    runs-on: ubuntu-latest
    timeout-minutes: 24
    container:
      image: fedora:43
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        run: |
          dnf --setopt=install_weak_deps=False --assumeyes install \
            avahi-devel \
            bison \
            cargo \
            chkconfig \
            cracklib-devel \
            cups-devel \
            dbus-devel \
            dconf \
            flex \
            gcc-c++ \
            git \
            glib2-devel \
            iniparser-devel \
            krb5-devel \
            libacl-devel \
            libdb-devel \
            libev-devel \
            file-devel \
            libgcrypt-devel \
            libtalloc-devel \
            localsearch \
            make \
            mariadb-connector-c-devel \
            meson \
            ninja-build \
            openldap-devel \
            pam-devel \
            pandoc \
            perl \
            quota-devel \
            sqlite-devel \
            rust \
            systemd \
            systemtap-sdt-devel \
            tinysparql-devel \
            valgrind \
            xapian-core-devel
      - name: Install stuffit-ffi
        run: |
          git clone https://github.com/benletchford/stuffit-rs.git /tmp/stuffit-rs
          cd /tmp/stuffit-rs
          git checkout "$STUFFIT_RS_COMMIT"
          cargo build --release --locked -p stuffit-ffi
          make -C stuffit-ffi install-files PREFIX=/usr/local
      - name: Configure
        run: |
          meson setup build \
            -Dbuildtype=debugoptimized \
            -Dwith-appletalk=true \
            -Dwith-cups-pap-backend=true \
            -Dwith-eventloop=libev \
            -Dwith-init-hooks=false \
            -Dwith-stuffit=true \
            -Dwith-tests=true \
            -Dwith-testsuite=true
      - name: Build
        run: meson compile -C build
      - name: Test
        run: meson test -C build
      - name: Run memory profiling
        run: meson test --wrapper='valgrind --leak-check=full --error-exitcode=1' -C build
      - name: Install
        run: sudo meson install -C build
      - name: Check netatalk capabilities
        run: |
          netatalk -V
          afpd -V
          atalkd -V
          a2boot -V
          macipgw -V
          papd -V
          timelord -V
      - name: Upload meson logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meson-logs-${{ github.job }}
          path: build/meson-logs

  build-ubuntu:
    name: Ubuntu Linux
    runs-on: ubuntu-latest
    timeout-minutes: 24
    container:
      image: ubuntu:25.10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install --assume-yes --no-install-recommends \
            bison \
            ca-certificates \
            cmark-gfm \
            cracklib-runtime \
            dconf-cli \
            file \
            flex \
            g++ \
            gcc \
            libacl1-dev \
            libavahi-client-dev \
            libcrack2-dev \
            libcups2-dev \
            libdb-dev \
            libdbus-1-dev \
            libev-dev \
            libgcrypt20-dev \
            libglib2.0-dev \
            libiniparser-dev \
            libkrb5-dev \
            libldap2-dev \
            libmagic-dev \
            libmariadb-dev \
            libpam0g-dev \
            libsqlite3-dev \
            libtalloc-dev \
            libtirpc-dev \
            libtracker-sparql-3.0-dev \
            libwrap0-dev \
            libxapian-dev \
            meson \
            ninja-build \
            quota \
            systemtap-sdt-dev \
            tcpd \
            tracker \
            tracker-miner-fs
      - name: Configure
        run: |
          meson setup build \
            -Dbuildtype=debugoptimized \
            -Dwith-appletalk=true \
            -Dwith-cups-pap-backend=true \
            -Dwith-eventloop=libev \
            -Dwith-init-hooks=false \
            -Dwith-tests=true \
            -Dwith-testsuite=true
      - name: Build
        run: meson compile -C build
      - name: Test
        run: meson test -C build
      - name: Install
        run: meson install -C build
      - name: Check netatalk capabilities
        run: |
          netatalk -V
          afpd -V
          atalkd -V
          a2boot -V
          macipgw -V
          papd -V
          timelord -V
      - name: Upload meson logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meson-logs-${{ github.job }}
          path: build/meson-logs

  build-ubuntu-32bit:
    name: Ubuntu Linux (32-bit)
    runs-on: ubuntu-latest
    timeout-minutes: 24
    container:
      image: ubuntu:25.10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install 32-bit toolchain and dependencies
        run: |
          dpkg --add-architecture i386
          apt-get update
          apt-get install --assume-yes --no-install-recommends \
            ca-certificates \
            cmark-gfm \
            cracklib-runtime \
            dconf-cli \
            file \
            g++-multilib \
            gcc-multilib \
            libacl1-dev:i386 \
            libavahi-client-dev:i386 \
            libcrack2-dev:i386 \
            libcups2-dev:i386 \
            libdb-dev:i386 \
            libdbus-1-dev:i386 \
            libevent-dev:i386 \
            libgcrypt20-dev:i386 \
            libiniparser-dev:i386 \
            libkrb5-dev:i386 \
            libldap2-dev:i386 \
            libmagic-dev:i386 \
            libpam0g-dev:i386 \
            libtalloc-dev:i386 \
            libtirpc-dev:i386 \
            libwrap0-dev:i386 \
            libsqlite3-dev:i386 \
            libxapian-dev:i386 \
            meson \
            ninja-build \
            pkg-config \
            quota \
            systemtap-sdt-dev \
            tcpd
      - name: Configure (32-bit)
        env:
          CFLAGS: -m32
          CXXFLAGS: -m32
          LDFLAGS: -m32
          PKG_CONFIG_LIBDIR: /usr/lib/i386-linux-gnu/pkgconfig:/usr/share/pkgconfig
        run: |
          meson setup build \
            -Dbuildtype=debugoptimized \
            -Dwith-appletalk=true \
            -Dwith-dtrace=false \
            -Dwith-init-hooks=false \
            -Dwith-tests=true \
            -Dwith-testsuite=true
      - name: Build
        run: meson compile -C build
      - name: Verify 32-bit binary
        run: file build/etc/afpd/afpd | grep -q 'ELF 32-bit'
      - name: Test
        run: meson test -C build
      - name: Install
        run: meson install -C build
      - name: Check netatalk capabilities
        run: |
          netatalk -V
          afpd -V
          atalkd -V
          a2boot -V
          macipgw -V
          papd -V
          timelord -V
      - name: Upload meson logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meson-logs-${{ github.job }}
          path: build/meson-logs
