name: Tests

on:
  push:
    branches:
      - main
      - branch-*
  pull_request:
    branches:
      - main
      - branch-*
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  formatting:
    name: Code Formatting
    runs-on: ubuntu-latest
    container:
      image: alpine:3.23.2
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            astyle \
            ca-certificates \
            git \
            muon \
            nodejs \
            npm \
            perl-tidy \
            shfmt \
            yamlfmt
          npm install --global --ignore-scripts markdownlint-cli2@0.22.0
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Check C formatting
        run: ./contrib/scripts/codefmt.sh -v -s c
      - name: Check markdown formatting
        run: ./contrib/scripts/codefmt.sh -v -s markdown
      - name: Check meson formatting
        run: ./contrib/scripts/codefmt.sh -v -s meson
      - name: Check perl formatting
        run: ./contrib/scripts/codefmt.sh -v -s perl
      - name: Check shell script formatting
        run: ./contrib/scripts/codefmt.sh -v -s shell
      - name: Check yaml formatting
        run: ./contrib/scripts/codefmt.sh -v -s yaml

  markdown-linting:
    name: Markdown Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0
        with:
          globs: '**/*.md'

  distribution-tests:
    name: Distribution Tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends \
            libevent-dev \
            libgcrypt20-dev \
            libiniparser-dev \
            meson \
            ninja-build
      - name: Configure
        run: |
          meson setup build \
            -Dbuildtype=release \
            -Dwith-init-hooks=false \
            -Dwith-tests=true
      - name: Run distribution tests
        run: meson dist -C build

  build-doxygen-docs:
    name: Build Doxygen Docs
    runs-on: ubuntu-latest
    container:
      image: alpine:3.23.2
    timeout-minutes: 12
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            build-base \
            ca-certificates \
            doxygen \
            gcc \
            git \
            iniparser-dev \
            libevent-dev \
            libgcrypt-dev \
            meson \
            pkgconf \
            sqlite-dev
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure
        run: |
          meson setup build \
            -Dbuildtype=debug \
            -Dwith-docs=developer \
            -Dwith-doxygen-strict=true
      - name: Upload Meson log on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: meson-log
          path: build/meson-logs/meson-log.txt
